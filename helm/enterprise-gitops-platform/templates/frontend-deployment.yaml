apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"

        ports:
        - containerPort: 80