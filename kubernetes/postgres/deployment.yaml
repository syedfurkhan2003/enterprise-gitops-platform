apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres
  namespace: devops-project

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
      - name: postgres
        image: postgres:15

        ports:
        - containerPort: 5432

        envFrom:
        - secretRef:
            name: postgres-secret

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data

      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc